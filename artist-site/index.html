<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>권회찬</title>
<meta name="description" content="권회찬 작가 CV — Works, Text, Contact" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="#/" class="site-title" data-i18n="navHome">권회찬</a>

    <div class="header-right">
      <button id="lang-toggle" class="lang-toggle" type="button">
        <span class="lang-full" data-i18n="langToggle">English</span>
        <span class="lang-short" data-i18n="langToggleShort">EN</span>
      </button>

      <button type="button" id="menu-trigger" class="nav-icon menu-trigger" aria-label="메뉴" title="메뉴">
        <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6">
          <line x1="2.5" y1="6" x2="17.5" y2="6"></line>
          <line x1="2.5" y1="10" x2="17.5" y2="10"></line>
          <line x1="2.5" y1="14" x2="17.5" y2="14"></line>
        </svg>
      </button>

      <ul class="site-nav" id="site-nav">
        <li><a href="#/" data-i18n="navCV">CV</a></li>
        <li><a href="#/works" data-i18n="navWorks">Works</a></li>
        <li><a href="#/text" data-i18n="navText">Text</a></li>
        <li><a href="#/contact" data-i18n="navContact">Contact</a></li>
      </ul>

      <button type="button" id="search-trigger" class="nav-icon" data-i18n-aria="navSearch" aria-label="검색" title="검색">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="8.5" cy="8.5" r="6"></circle>
          <line x1="13" y1="13" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="search-overlay" id="search-overlay">
  <div class="search-panel" id="search-panel">
    <form id="overlay-search-form" class="overlay-search-form" autocomplete="off">
      <input type="text" id="overlay-search-input" class="overlay-search-input" autocomplete="off" spellcheck="false" data-i18n-placeholder="searchPlaceholder" placeholder="검색어를 입력하세요" />
    </form>
    <div class="recent-searches" id="recent-searches"></div>
  </div>
</div>

<main id="app"></main>

<footer class="site-footer">
  <div class="wrap">
    <span data-i18n="footer">© 2026 Kwon Hoechan. All works reserved.</span>
  </div>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close" data-i18n="lbClose">닫기 ✕</button>
  <div class="lb-inner" id="lb-inner">
    <div class="lb-image-wrap" id="lb-image-wrap">
      <img id="lb-image-peek-prev" src="" alt="" style="display:none;" />
      <img id="lb-image-peek-next" src="" alt="" style="display:none;" />
      <img id="lb-image" src="" alt="" />
    </div>
    <div class="lb-info" id="lb-info">
      <div class="lb-links" id="lb-links"></div>
      <p class="lb-note" id="lb-note"></p>
      <p class="lb-caption-line" id="lb-caption-line"></p>
    </div>
  </div>
</div>

<div class="shortcuts-panel" id="shortcuts-panel">
  <div class="shortcuts-inner">
    <button class="shortcuts-close" id="shortcuts-close" aria-label="닫기">✕</button>
    <h3 data-i18n="shortcutsTitle">단축키</h3>
    <ul id="shortcuts-list"></ul>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
